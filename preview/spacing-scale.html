<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: #fff; color: var(--dh-text-primary); }
  .grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 8px; align-items: end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { width: 100%; background: var(--dh-blue-60); }
  .tok { font: var(--dh-type-code-01); color: var(--dh-text-secondary); }
  .px  { font: var(--dh-type-caption-01); color: var(--dh-text-helper); }
</style></head>
<body>
  <div class="grid">
    <div class="col"><div class="bar" style="height: 2px;"></div><span class="tok">01</span><span class="px">2px</span></div>
    <div class="col"><div class="bar" style="height: 4px;"></div><span class="tok">02</span><span class="px">4px</span></div>
    <div class="col"><div class="bar" style="height: 8px;"></div><span class="tok">03</span><span class="px">8px</span></div>
    <div class="col"><div class="bar" style="height: 12px;"></div><span class="tok">04</span><span class="px">12px</span></div>
    <div class="col"><div class="bar" style="height: 16px;"></div><span class="tok">05</span><span class="px">16px</span></div>
    <div class="col"><div class="bar" style="height: 24px;"></div><span class="tok">06</span><span class="px">24px</span></div>
    <div class="col"><div class="bar" style="height: 32px;"></div><span class="tok">07</span><span class="px">32px</span></div>
    <div class="col"><div class="bar" style="height: 40px;"></div><span class="tok">08</span><span class="px">40px</span></div>
    <div class="col"><div class="bar" style="height: 48px;"></div><span class="tok">09</span><span class="px">48px</span></div>
    <div class="col"><div class="bar" style="height: 64px;"></div><span class="tok">10</span><span class="px">64px</span></div>
    <div class="col"><div class="bar" style="height: 80px;"></div><span class="tok">11</span><span class="px">80px</span></div>
    <div class="col"><div class="bar" style="height: 96px;"></div><span class="tok">12</span><span class="px">96px</span></div>
    <div class="col"><div class="bar" style="height: 160px;"></div><span class="tok">13</span><span class="px">160px</span></div>
  </div>
</body></html>
