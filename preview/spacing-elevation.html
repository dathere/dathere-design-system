<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 36px 28px; background: var(--dh-gray-10); color: var(--dh-text-primary); }
  .row { display: flex; gap: 24px; align-items: stretch; }
  .card { flex: 1; height: 120px; background: var(--dh-white); display: flex; flex-direction: column; justify-content: space-between; padding: 16px; }
  .sm { box-shadow: var(--dh-shadow-sm); }
  .md { box-shadow: var(--dh-shadow-md); }
  .lg { box-shadow: var(--dh-shadow-lg); }
  .name { font: var(--dh-type-heading-01); }
  .tok  { font: var(--dh-type-code-01); color: var(--dh-text-secondary); }
  .role { font: var(--dh-type-caption-01); color: var(--dh-text-helper); }
  .flat { border: 1px solid var(--dh-border-subtle-01); }
</style></head>
<body>
  <div class="row">
    <div class="card flat">
      <div><div class="name">flat (default)</div><div class="tok">border 1px subtle-01</div></div>
      <span class="role">cards / tiles / panels</span>
    </div>
    <div class="card sm">
      <div><div class="name">shadow-sm</div><div class="tok">0 1px 2px rgba(0,0,0,.08)</div></div>
      <span class="role">popovers / tooltips</span>
    </div>
    <div class="card md">
      <div><div class="name">shadow-md</div><div class="tok">0 2px 6px rgba(0,0,0,.10)</div></div>
      <span class="role">dropdowns / hover tiles</span>
    </div>
    <div class="card lg">
      <div><div class="name">shadow-lg</div><div class="tok">0 8px 24px rgba(0,0,0,.14)</div></div>
      <span class="role">modals / drawers</span>
    </div>
  </div>
</body></html>
