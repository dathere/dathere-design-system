<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: #fff; color: var(--dh-text-primary); }
  .row { display: grid; grid-template-columns: 120px 1fr 200px; gap: 16px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--dh-border-subtle-00); }
  .row:last-child { border-bottom: 0; }
  .tok  { font: var(--dh-type-code-01); color: var(--dh-text-secondary); }
  .spec { font: var(--dh-type-helper-text-01); color: var(--dh-text-helper); text-align: right; }
  .h7 { font: var(--dh-type-heading-07); letter-spacing: -0.01em; }
  .h6 { font: var(--dh-type-heading-06); letter-spacing: -0.01em; }
  .h5 { font: var(--dh-type-heading-05); }
  .h4 { font: var(--dh-type-heading-04); }
  .h3 { font: var(--dh-type-heading-03); }
  .h2 { font: var(--dh-type-heading-02); }
  .h1 { font: var(--dh-type-heading-01); }
</style></head>
<body>
  <div class="row"><span class="tok">heading-07</span><span class="h7">Heading 07</span><span class="spec">54/64 · 300</span></div>
  <div class="row"><span class="tok">heading-06</span><span class="h6">Heading 06</span><span class="spec">42/50 · 300</span></div>
  <div class="row"><span class="tok">heading-05</span><span class="h5">Heading 05</span><span class="spec">32/40 · 400</span></div>
  <div class="row"><span class="tok">heading-04</span><span class="h4">Heading 04</span><span class="spec">28/36 · 400</span></div>
  <div class="row"><span class="tok">heading-03</span><span class="h3">Heading 03</span><span class="spec">20/28 · 400</span></div>
  <div class="row"><span class="tok">heading-02</span><span class="h2">Heading 02</span><span class="spec">16/22 · 600</span></div>
  <div class="row"><span class="tok">heading-01</span><span class="h1">Heading 01</span><span class="spec">14/18 · 600</span></div>
</body></html>
